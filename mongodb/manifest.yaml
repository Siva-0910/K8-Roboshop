apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop-mongodb
    environment: dev
    tier: database
spec:
  replicas: 1
  selector:
   matchLabels:
     project: roboshop-mongodb
     environment: dev
     tier: database
  template:
    metadata:
      name: roboshop-mongodb
      labels:
        project: roboshop-mongodb
        environment: dev
        tier: database  
    spec:
      containers:
      - name: mongodb
        image: sivpri/mongodb:v1
        command:
        - mongod
        - "--bind_ip"
        - "0.0.0.0"
        - "--port"
        - "27017"

---

apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop-mongodb
    environment: dev
    tier: database
spec:
  selector:
    project: roboshop-mongodb
    environment: dev
    tier: database
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27027    

