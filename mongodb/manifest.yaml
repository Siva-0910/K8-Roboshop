apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop-mongodb
    environment: dev
    tier: database
spec:
  replicas: 1
  selector:
   matchLabels:
     project: roboshop-mongodb
     environment: dev
     tier: database
  template:
    metadata:
      name: roboshop-mongodb
      labels:
        project: roboshop-mongodb
        environment: dev
        tier: database  
    spec:
      containers:
      - name: mongodb
        image: sivpri/mongodb:v1

