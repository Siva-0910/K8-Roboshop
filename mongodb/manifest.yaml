apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: roboshop
  name: mongodb-deployment
  labels:
    tier: database
    project: roboshop
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: database
      project: roboshop
      env: dev 
  template:
    metadata:
      name: mongodb
      labels:
        tier: database
        project: roboshop
        env: dev  
    spec:
      containers:
      - name: mongodb
        image: sivpri/mongodb:v1  

---

apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  labels:
    name: mongo-service
spec:
  selector:
    tier: database
    project: roboshop
    env: dev 
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27027        

